name: Build sandbox image

on:
  push:
    branches: [master]
    paths:
      - 'docker/Dockerfile.sandbox'
      - 'docker/install_r_packages.R'
      - '.github/workflows/build-sandbox-image.yml'
  pull_request:
    paths:
      - 'docker/Dockerfile.sandbox'
      - 'docker/install_r_packages.R'
      - '.github/workflows/build-sandbox-image.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (in addition to git sha + latest on master)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/baponi-biomni

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sandbox-latest,enable={{is_default_branch}}
            type=raw,value=sandbox-${{ github.sha }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sandbox
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Linux/amd64 only — Baponi sandboxes run on x86_64.
          platforms: linux/amd64

      - name: Make package public
        if: github.event_name != 'pull_request'
        # The package only exists after the first successful push, so this
        # step no-ops on the very first run if the build cache is empty.
        # Requires a PAT with `admin:packages` (workflow GITHUB_TOKEN scope
        # is insufficient for visibility changes). Fall back gracefully if
        # the secret isn't configured so the build still goes green.
        env:
          GH_TOKEN: ${{ secrets.GHCR_VISIBILITY_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # The package name on ghcr.io is the lowercase repo name.
          PKG_NAME="$(echo '${{ env.IMAGE_NAME }}' | awk -F/ '{print $NF}' | tr '[:upper:]' '[:lower:]')"
          OWNER="${{ github.repository_owner }}"
          echo "Setting visibility=public on $OWNER/$PKG_NAME"
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/users/$OWNER/packages/container/$PKG_NAME/visibility" \
            -f visibility=public \
            || echo "[warn] visibility change failed (likely first push: package not yet registered, or token lacks admin:packages). Re-run after the first publish, or set GHCR_VISIBILITY_TOKEN."
