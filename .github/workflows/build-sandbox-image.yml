name: Build sandbox image

on:
  push:
    branches: [master]
    paths:
      - 'docker/Dockerfile.sandbox'
      - 'docker/install_r_packages.R'
      - '.github/workflows/build-sandbox-image.yml'
  pull_request:
    paths:
      - 'docker/Dockerfile.sandbox'
      - 'docker/install_r_packages.R'
      - '.github/workflows/build-sandbox-image.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (in addition to git sha + latest on master)'
        required: false
        default: ''

env:
  # Docker Hub repo. Public on free-tier accounts, no storage cap on public
  # images. Requires DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets.
  IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME || 'orireshef' }}/baponi-biomni

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=sandbox-latest,enable={{is_default_branch}}
            type=raw,value=sandbox-${{ github.sha }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sandbox
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Linux/amd64 only — Baponi sandboxes run on x86_64.
          platforms: linux/amd64
